plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.instantportrait.exif'
version = '1.0.0'

android {
  namespace 'com.instantportrait.exif'
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  def camerax_version = "1.5.0-rc01"
  implementation "androidx.camera:camera-core:${camerax_version}"
  implementation "androidx.camera:camera-camera2:${camerax_version}"
  implementation "androidx.camera:camera-lifecycle:${camerax_version}"
  implementation "androidx.camera:camera-view:${camerax_version}"

  api 'androidx.exifinterface:exifinterface:1.4.1'
  // Filtragem on-device (faces) - usado para "sem pessoas"
  implementation 'com.google.mlkit:face-detection:16.1.7'
  // Filtragem on-device (pessoa/corpo), melhor que rosto para "de costas"
  implementation 'com.google.mlkit:pose-detection:18.0.0-beta5'
}
